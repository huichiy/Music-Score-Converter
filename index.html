<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jianpu Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/build/Midi.js"></script>
    <style>
        :root {
            --bg: #F9F9F9;
            --surface: #FFFFFF;
            --border: rgba(0, 0, 0, 0.2);
            --accent: #DC2626;
            --text: #0A0A0A;
            --text-muted: #6B6B6B;
            --btn-bg: #0A0A0A;
            --btn-text: #FFFFFF;
            --select-bg: #F0F0F0;
        }

        [data-theme="dark"] {
            --bg: #0A0A0A;
            --surface: #111111;
            --border: rgba(255, 255, 255, 0.2);
            --text: #FFFFFF;
            --text-muted: #6B6B6B;
            --btn-bg: #FFFFFF;
            --btn-text: #0A0A0A;
            --select-bg: #222222;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.2s, color 0.2s;
        }

        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .theme-toggle:hover {
            color: var(--text);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
        }

        .container {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            padding-top: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            padding-bottom: 80px;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .badge {
            background: var(--accent);
            color: #FFFFFF;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 14px;
            letter-spacing: 2px;
            padding: 3px 14px;
            border-radius: 999px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .title {
            font-weight: 300;
            font-size: 42px;
            letter-spacing: -1.5px;
            margin: 0 0 12px 0;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0 0 48px 0;
            text-align: center;
        }

        .upload-zone {
            width: 100%;
            border: 1px dashed var(--border);
            border-radius: 10px;
            padding: 48px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s;
            position: relative;
        }

        .upload-zone.dragover {
            border-color: var(--accent);
        }

        .upload-icon {
            width: 32px;
            height: 32px;
            stroke: var(--text-muted);
            fill: none;
            stroke-width: 1.2;
            margin-bottom: 12px;
        }

        .upload-text {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .upload-or {
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.6;
            margin-bottom: 8px;
        }

        .browse-label {
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
            position: relative;
        }

        .browse-label:hover {
            color: var(--accent);
        }

        .browse-label::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: transparent;
            transition: background-color 0.2s;
        }

        .browse-label:hover::after {
            background-color: var(--accent);
        }

        input[type="file"] {
            display: none;
        }

        .convert-btn {
            width: 100%;
            margin-top: 16px;
            background: var(--btn-bg);
            color: var(--btn-text);
            font-size: 14px;
            font-weight: 500;
            padding: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s, background 0.2s, color 0.2s, border 0.2s;
        }

        .convert-btn:hover:not(:disabled) {
            opacity: 0.85;
        }

        .convert-btn:disabled {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            cursor: not-allowed;
        }

        .output-zone {
            width: 100%;
            margin-top: 32px;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 2.2;
            white-space: pre-wrap;
            display: none;
            overflow-x: auto;
            color: var(--text);
        }

        .error-message {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            background: rgba(220, 38, 38, 0.1);
            color: var(--accent);
            border: 1px solid rgba(220, 38, 38, 0.2);
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .controls-row {
            width: 100%;
            display: none;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 24px;
            margin-bottom: 8px;
        }

        .part-selector {
            background: var(--select-bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        .auto-detect-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            margin-left: 2px;
            display: none;
            position: absolute;
            top: 100%;
        }

        .part-selector-container {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .download-group {
            display: flex;
            gap: 8px;
        }

        .download-btn {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .download-btn:hover {
            border-color: var(--text);
            background: var(--select-bg);
        }

        @media print {
            body * {
                visibility: hidden;
            }

            #output,
            #output * {
                visibility: visible;
                color: #000 !important;
                background: #fff !important;
                border: none !important;
            }

            #output {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 0;
            }
        }

        .footer {
            margin-top: auto;
            padding-bottom: 40px;
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            width: 100%;
        }
    </style>
</head>

<body>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <!-- Sun icon default -->
        <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <!-- Will switch via JS -->
        </svg>
    </button>

    <div class="container">
        <header>
            <span class="badge">简谱</span>
            <h1 class="title">Jianpu Converter</h1>
            <p class="subtitle">Convert MusicXML scores to Jianpu numbered notation</p>
        </header>

        <div class="upload-zone" id="dropzone">
            <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <div class="upload-text" id="fileNameDisplay">Drop your .xml, .mxl, or .mid file here</div>
            <div class="upload-or">or</div>
            <label class="browse-label">
                Browse files
                <input type="file" id="fileInput" accept=".xml,.mxl,.mid,.midi">
            </label>
        </div>

        <button class="convert-btn" id="convertBtn" disabled>Convert to Jianpu</button>
        <div class="error-message" id="errorMsg"></div>

        <div class="controls-row" id="controlsRow">
            <div class="part-selector-container">
                <select class="part-selector" id="partSelector">
                    <option value="0">Part 1</option>
                </select>
                <div class="auto-detect-label" id="autoDetectLabel">Auto-detected melody line</div>
            </div>

            <div class="download-group">
                <button class="download-btn" id="dlTxt">.TXT</button>
                <button class="download-btn" id="dlPdf">.PDF</button>
                <button class="download-btn" id="dlPng">.PNG</button>
                <button class="download-btn" id="dlJpeg">.JPEG</button>
            </div>
        </div>

        <div class="output-zone" id="output"></div>
    </div>

    <div class="footer">简谱 Jianpu Converter · Built for Chinese orchestra musicians</div>

    <script src="js/parser.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/downloader.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
