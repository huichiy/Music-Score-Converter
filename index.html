<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jianpu Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/build/Midi.js"></script>
    <style>
        :root {
            --bg: #F9F9F9;
            --surface: #FFFFFF;
            --border: rgba(0, 0, 0, 0.2);
            --accent: #DC2626;
            --text: #0A0A0A;
            --text-muted: #6B6B6B;
            --btn-bg: #0A0A0A;
            --btn-text: #FFFFFF;
            --select-bg: #F0F0F0;
        }

        [data-theme="dark"] {
            --bg: #0A0A0A;
            --surface: #111111;
            --border: rgba(255, 255, 255, 0.2);
            --text: #FFFFFF;
            --text-muted: #6B6B6B;
            --btn-bg: #FFFFFF;
            --btn-text: #0A0A0A;
            --select-bg: #222222;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.2s, color 0.2s;
        }

        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .theme-toggle:hover {
            color: var(--text);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
        }

        .container {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            padding-top: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .badge {
            background: var(--accent);
            color: #FFFFFF;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 14px;
            letter-spacing: 2px;
            padding: 3px 14px;
            border-radius: 999px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .title {
            font-weight: 300;
            font-size: 42px;
            letter-spacing: -1.5px;
            margin: 0 0 12px 0;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0 0 48px 0;
            text-align: center;
        }

        .upload-zone {
            width: 100%;
            border: 1px dashed var(--border);
            border-radius: 10px;
            padding: 48px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s;
            position: relative;
        }

        .upload-zone.dragover {
            border-color: var(--accent);
        }

        .upload-icon {
            width: 32px;
            height: 32px;
            stroke: var(--text-muted);
            fill: none;
            stroke-width: 1.2;
            margin-bottom: 12px;
        }

        .upload-text {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .upload-or {
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.6;
            margin-bottom: 8px;
        }

        .browse-label {
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
            position: relative;
        }

        .browse-label:hover {
            color: var(--accent);
        }

        .browse-label::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: transparent;
            transition: background-color 0.2s;
        }

        .browse-label:hover::after {
            background-color: var(--accent);
        }

        input[type="file"] {
            display: none;
        }

        .convert-btn {
            width: 100%;
            margin-top: 16px;
            background: var(--btn-bg);
            color: var(--btn-text);
            font-size: 14px;
            font-weight: 500;
            padding: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s, background 0.2s, color 0.2s, border 0.2s;
        }

        .convert-btn:hover:not(:disabled) {
            opacity: 0.85;
        }

        .convert-btn:disabled {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            cursor: not-allowed;
        }

        .output-zone {
            width: 100%;
            margin-top: 32px;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 2.2;
            white-space: pre-wrap;
            display: none;
            color: var(--text);
        }

        .error-message {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            background: rgba(220, 38, 38, 0.1);
            color: var(--accent);
            border: 1px solid rgba(220, 38, 38, 0.2);
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .controls-row {
            width: 100%;
            display: none;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            margin-bottom: 8px;
        }

        .part-selector {
            background: var(--select-bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        .auto-detect-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            margin-left: 2px;
            display: none;
            position: absolute;
            top: 100%;
        }

        .part-selector-container {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .download-group {
            display: flex;
            gap: 8px;
        }

        .download-btn {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .download-btn:hover {
            border-color: var(--text);
            background: var(--select-bg);
        }

        @media print {
            body * {
                visibility: hidden;
            }

            #output,
            #output * {
                visibility: visible;
                color: #000 !important;
                background: #fff !important;
                border: none !important;
            }

            #output {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 0;
            }
        }

        .footer {
            margin-top: auto;
            padding-bottom: 40px;
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            width: 100%;
        }
    </style>
</head>

<body>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <!-- Sun icon default -->
        <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <!-- Will switch via JS -->
        </svg>
    </button>

    <div class="container">
        <header>
            <span class="badge">简谱</span>
            <h1 class="title">Jianpu Converter</h1>
            <p class="subtitle">Convert MusicXML scores to Jianpu numbered notation</p>
        </header>

        <div class="upload-zone" id="dropzone">
            <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <div class="upload-text" id="fileNameDisplay">Drop your .xml, .mxl, or .mid file here</div>
            <div class="upload-or">or</div>
            <label class="browse-label">
                Browse files
                <input type="file" id="fileInput" accept=".xml,.mxl,.mid,.midi">
            </label>
        </div>

        <button class="convert-btn" id="convertBtn" disabled>Convert to Jianpu</button>
        <div class="error-message" id="errorMsg"></div>

        <div class="controls-row" id="controlsRow">
            <div class="part-selector-container">
                <select class="part-selector" id="partSelector">
                    <option value="0">Part 1</option>
                </select>
                <div class="auto-detect-label" id="autoDetectLabel">Auto-detected melody line</div>
            </div>

            <div class="download-group">
                <button class="download-btn" id="dlTxt">.TXT</button>
                <button class="download-btn" id="dlPdf">.PDF</button>
                <button class="download-btn" id="dlPng">.PNG</button>
                <button class="download-btn" id="dlJpeg">.JPEG</button>
            </div>
        </div>

        <div class="output-zone" id="output"></div>
    </div>

    <div class="footer">简谱 Jianpu Converter · Built for Chinese orchestra musicians</div>

    <script>
        // --- Theme Toggle ---
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const htmlDoc = document.documentElement;

        const moonPath = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        const sunPath = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';

        function updateIcon(theme) {
            themeIcon.innerHTML = theme === 'dark' ? sunPath : moonPath;
        }

        updateIcon('dark');

        themeToggle.addEventListener('click', () => {
            const currentTheme = htmlDoc.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            htmlDoc.setAttribute('data-theme', newTheme);
            updateIcon(newTheme);
        });

        // --- File Upload ---
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const convertBtn = document.getElementById('convertBtn');
        const output = document.getElementById('output');
        const controlsRow = document.getElementById('controlsRow');
        const partSelector = document.getElementById('partSelector');
        const autoDetectLabel = document.getElementById('autoDetectLabel');
        const errorMsg = document.getElementById('errorMsg');

        let currentFile = null;
        let parsedXmlDoc = null;

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            convertBtn.textContent = 'Convert to Jianpu';
            convertBtn.disabled = false;
        }

        function handleFile(file) {
            if (!file) return;
            currentFile = file;
            fileNameDisplay.textContent = file.name;
            fileNameDisplay.style.color = "var(--text)";
            convertBtn.disabled = false;
            output.style.display = 'none';
            controlsRow.style.display = 'none';
            partSelector.parentElement.style.display = '';
            autoDetectLabel.style.display = 'none';
            errorMsg.style.display = 'none';
            parsedXmlDoc = null;
        }

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });
        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dragover');
        });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        // --- Core Jianpu Logic ---
        function pitchToSemitones(step, alter, octave) {
            const stepMap = { 'C': 0, 'D': 2, 'E': 4, 'F': 5, 'G': 7, 'A': 9, 'B': 11 };
            return stepMap[step] + alter + (octave * 12);
        }

        function parseXMLToJianpu(xmlDoc) {
            // Find key signature
            let fifths = 0;
            const fifthsNodes = xmlDoc.getElementsByTagName("fifths");
            if (fifthsNodes.length > 0) {
                fifths = parseInt(fifthsNodes[0].textContent);
            }

            // Find time signature
            let beats = "4";
            let beatType = "4";
            const beatsNodes = xmlDoc.getElementsByTagName("beats");
            if (beatsNodes.length > 0) beats = beatsNodes[0].textContent;
            const beatTypeNodes = xmlDoc.getElementsByTagName("beat-type");
            if (beatTypeNodes.length > 0) beatType = beatTypeNodes[0].textContent;

            const keyMap = {
                "-7": "Cb", "-6": "Gb", "-5": "Db", "-4": "Ab", "-3": "Eb", "-2": "Bb", "-1": "F",
                "0": "C", "1": "G", "2": "D", "3": "A", "4": "E", "5": "B", "6": "F#", "7": "C#"
            };
            const keyStr = keyMap[fifths.toString()] || "C";

            let baseTonicStep = keyStr[0];
            let baseTonicAlter = keyStr.includes('#') ? 1 : (keyStr.includes('b') ? -1 : 0);
            let baseTonicSemi = pitchToSemitones(baseTonicStep, baseTonicAlter, 4);

            const scaleDegrees = [0, 2, 4, 5, 7, 9, 11];
            const stepMapDiatonic = { 'C': 0, 'D': 1, 'E': 2, 'F': 3, 'G': 4, 'A': 5, 'B': 6 };

            let jianpuLines = [];

            // Assume single part, get measures
            const measures = xmlDoc.getElementsByTagName("measure");

            for (let i = 0; i < measures.length; i++) {
                let measureNotes = [];
                const notes = measures[i].getElementsByTagName("note");

                for (let j = 0; j < notes.length; j++) {
                    const note = notes[j];

                    // Skip chords/harmony for simple melody line
                    if (note.getElementsByTagName("chord").length > 0 || note.getElementsByTagName("grace").length > 0) {
                        continue;
                    }

                    let noteValue = "0"; // Default rest
                    let isRest = note.getElementsByTagName("rest").length > 0;

                    if (!isRest) {
                        const pitchNode = note.getElementsByTagName("pitch")[0];
                        if (pitchNode) {
                            const step = pitchNode.getElementsByTagName("step")[0].textContent;
                            let alter = 0;
                            const alterNode = pitchNode.getElementsByTagName("alter")[0];
                            if (alterNode) alter = parseInt(alterNode.textContent);
                            const octave = parseInt(pitchNode.getElementsByTagName("octave")[0].textContent);

                            let noteSemi = pitchToSemitones(step, alter, octave);

                            let tonicDiatonicAbs = stepMapDiatonic[baseTonicStep] + 4 * 7;
                            let noteDiatonicAbs = stepMapDiatonic[step] + octave * 7;

                            let diatonicDiff = noteDiatonicAbs - tonicDiatonicAbs;
                            let degree = (diatonicDiff % 7);
                            if (degree < 0) degree += 7;

                            let shift = Math.floor(diatonicDiff / 7);

                            let intendedSemi = baseTonicSemi + Math.floor(diatonicDiff / 7) * 12 + scaleDegrees[degree];
                            let acc = "";
                            if (noteSemi > intendedSemi) acc = "#";
                            if (noteSemi < intendedSemi) acc = "b";

                            noteValue = acc + (degree + 1).toString();
                            if (shift > 0) noteValue += "'".repeat(shift);
                            if (shift < 0) noteValue += ".".repeat(Math.abs(shift));
                        }
                    }

                    // Handling Duration / Rhythm Type
                    let noteType = "quarter";
                    const typeNode = note.getElementsByTagName("type")[0];
                    if (typeNode) noteType = typeNode.textContent;

                    // Handling Dots
                    const hasDot = note.getElementsByTagName("dot").length > 0;
                    let dotStr = hasDot ? "." : "";

                    // Handling Ties
                    const tieNode = note.getElementsByTagName("tie")[0];
                    let isTieStop = (tieNode && tieNode.getAttribute("type") === "stop");

                    let noteStr = noteValue;

                    if (isTieStop) {
                        // If it's a tied continuation, we just print the dashes based on duration but usually just one '-' per beat representation
                        if (noteType === "whole") noteStr = "- - - -";
                        else if (noteType === "half") noteStr = "- -";
                        else if (noteType === "quarter") noteStr = "-";
                        else if (noteType === "eighth") noteStr = "-_";
                        else if (noteType === "16th") noteStr = "-__";
                    } else {
                        if (noteType === "whole") {
                            noteStr = noteValue + " - - -" + dotStr;
                        } else if (noteType === "half") {
                            noteStr = noteValue + dotStr + " -";
                        } else if (noteType === "quarter") {
                            noteStr = noteValue + dotStr;
                        } else if (noteType === "eighth") {
                            noteStr = noteValue + dotStr + "_";
                        } else if (noteType === "16th") {
                            noteStr = noteValue + dotStr + "__";
                        } else if (noteType === "32nd") {
                            noteStr = noteValue + dotStr + "___";
                        } else {
                            // Default fallback
                            noteStr = noteValue + dotStr;
                        }
                    }

                    measureNotes.push(noteStr);
                }

                if (measureNotes.length > 0) {
                    jianpuLines.push(measureNotes.join(" "));
                }
            }

            if (jianpuLines.length === 0) return "No compatible notes found.";

            let chunks = [];
            // Group 4 measures per line
            for (let i = 0; i < jianpuLines.length; i += 4) {
                chunks.push(jianpuLines.slice(i, i + 4).join(" | "));
            }

            return `Key: 1=${keyStr}   Time: ${beats}/${beatType}\n\n` + chunks.join(" |\n") + " |";
        }

        function renderSelectedPart() {
            if (!parsedXmlDoc) return;

            const selectedIdx = parseInt(partSelector.value);
            const partsList = parsedXmlDoc.getElementsByTagName("part");
            if (partsList.length <= selectedIdx) return;

            const dummyDoc = document.implementation.createDocument(null, "score-partwise");
            dummyDoc.documentElement.appendChild(parsedXmlDoc.getElementsByTagName("part-list")[0].cloneNode(true));
            dummyDoc.documentElement.appendChild(partsList[selectedIdx].cloneNode(true));

            const result = parseXMLToJianpu(dummyDoc);
            output.textContent = result;
            output.style.display = 'block';
            controlsRow.style.display = 'flex';
        }

        partSelector.addEventListener('change', () => {
            autoDetectLabel.style.display = 'none';
            renderSelectedPart();
        });

        convertBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            convertBtn.textContent = 'Converting...';
            convertBtn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                if (currentFile.name.toLowerCase().endsWith('.mid') || currentFile.name.toLowerCase().endsWith('.midi')) {
                    const arrayBuffer = await currentFile.arrayBuffer();
                    const midi = new Midi(arrayBuffer);

                    // Key detection
                    let keyStr = "C";
                    if (midi.header.keySignatures && midi.header.keySignatures.length > 0) {
                        keyStr = midi.header.keySignatures[0].key;
                    }

                    let baseTonicStep = keyStr[0];
                    let baseTonicAlter = keyStr.includes('#') ? 1 : (keyStr.includes('b') ? -1 : 0);
                    let baseTonicSemi = pitchToSemitones(baseTonicStep, baseTonicAlter, 4);

                    const scaleDegrees = [0, 2, 4, 5, 7, 9, 11];
                    const stepMapDiatonic = { 'C': 0, 'D': 1, 'E': 2, 'F': 3, 'G': 4, 'A': 5, 'B': 6 };

                    // Find track with most notes
                    let bestTrack = null;
                    let maxNotes = -1;
                    for (let track of midi.tracks) {
                        if (track.notes.length > maxNotes) {
                            maxNotes = track.notes.length;
                            bestTrack = track;
                        }
                    }

                    if (!bestTrack || bestTrack.notes.length === 0) throw new Error("No notes found in MIDI.");

                    // Time signature
                    let beats = 4;
                    let beatType = 4;
                    if (midi.header.timeSignatures && midi.header.timeSignatures.length > 0) {
                        beats = midi.header.timeSignatures[0].timeSignature[0];
                        beatType = midi.header.timeSignatures[0].timeSignature[1];
                    }

                    const ppq = midi.header.ppq;
                    const measureTicks = beats * (4 / beatType) * ppq;

                    let jianpuLines = [];
                    let currentMeasureNotes = [];
                    let currentMeasureIdx = 0;

                    // Improved flat/sharp context mapping based on key signature
                    const useFlats = ["F", "Bb", "Eb", "Ab", "Db", "Gb", "Cb"].includes(keyStr);
                    const stepNames = useFlats
                        ? ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"]
                        : ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

                    for (let i = 0; i < bestTrack.notes.length; i++) {
                        const note = bestTrack.notes[i];
                        const noteMeasureIdx = Math.floor(note.ticks / measureTicks);

                        // Pad empty measures with rests
                        while (currentMeasureIdx < noteMeasureIdx) {
                            if (currentMeasureNotes.length > 0) {
                                jianpuLines.push(currentMeasureNotes.join(" "));
                                currentMeasureNotes = [];
                            } else {
                                jianpuLines.push("0 - - -");
                            }
                            currentMeasureIdx++;
                        }

                        let noteNum = note.midi;
                        let octave = Math.floor(noteNum / 12) - 1;
                        let semitone = noteNum % 12;

                        let stepStr = stepNames[semitone];
                        let step = stepStr[0];
                        let alter = 0;
                        if (stepStr.includes('b')) {
                            alter = -1;
                        } else if (stepStr.includes('#')) {
                            alter = 1;
                        }

                        let noteSemi = pitchToSemitones(step, alter, octave);
                        let tonicDiatonicAbs = stepMapDiatonic[baseTonicStep] + 4 * 7;
                        let noteDiatonicAbs = stepMapDiatonic[step] + octave * 7;

                        let diatonicDiff = noteDiatonicAbs - tonicDiatonicAbs;
                        let degree = (diatonicDiff % 7);
                        if (degree < 0) degree += 7;

                        let shift = Math.floor(diatonicDiff / 7);

                        let intendedSemi = baseTonicSemi + Math.floor(diatonicDiff / 7) * 12 + scaleDegrees[degree];
                        let acc = "";
                        if (noteSemi > intendedSemi) acc = "#";
                        if (noteSemi < intendedSemi) acc = "b";

                        let noteValue = acc + (degree + 1).toString();
                        if (shift > 0) noteValue += "'".repeat(shift);
                        if (shift < 0) noteValue += ".".repeat(Math.abs(shift));

                        // Rhythm
                        let noteBeats = note.durationTicks / ppq;
                        let noteType = "quarter";
                        let dotStr = "";

                        if (noteBeats >= 3.75) { noteType = "whole"; }
                        else if (noteBeats >= 2.75) { noteType = "half"; dotStr = "."; }
                        else if (noteBeats >= 1.75) { noteType = "half"; }
                        else if (noteBeats >= 1.25) { noteType = "quarter"; dotStr = "."; }
                        else if (noteBeats >= 0.75) { noteType = "quarter"; }
                        else if (noteBeats >= 0.6) { noteType = "eighth"; dotStr = "."; }
                        else if (noteBeats >= 0.35) { noteType = "eighth"; }
                        else { noteType = "16th"; }

                        let noteStr = noteValue;
                        if (noteType === "whole") {
                            noteStr = noteValue + " - - -" + dotStr;
                        } else if (noteType === "half") {
                            noteStr = noteValue + dotStr + " -";
                        } else if (noteType === "quarter") {
                            noteStr = noteValue + dotStr;
                        } else if (noteType === "eighth") {
                            noteStr = noteValue + dotStr + "_";
                        } else if (noteType === "16th") {
                            noteStr = noteValue + dotStr + "__";
                        }

                        currentMeasureNotes.push(noteStr);
                    }

                    if (currentMeasureNotes.length > 0) {
                        jianpuLines.push(currentMeasureNotes.join(" "));
                    }

                    let chunks = [];
                    for (let i = 0; i < jianpuLines.length; i += 4) {
                        chunks.push(jianpuLines.slice(i, i + 4).join(" | "));
                    }

                    const result = `Key: 1=${keyStr}   Time: ${beats}/${beatType}\n\n` + chunks.join(" |\n") + " |";

                    output.textContent = result;
                    output.style.display = 'block';
                    controlsRow.style.display = 'flex';
                    partSelector.parentElement.style.display = 'none'; // No part selector for MIDI yet

                    convertBtn.textContent = 'Convert to Jianpu';
                    convertBtn.disabled = false;
                    return;
                }

                let xmlText = "";

                if (currentFile.name.toLowerCase().endsWith('.mxl')) {
                    const arrayBuffer = await currentFile.arrayBuffer();
                    const zip = await JSZip.loadAsync(arrayBuffer);

                    // MXL structure usually contains a META-INF/container.xml 
                    // which points to the real file. We'll find the first .xml
                    let targetFile = null;
                    for (let filename in zip.files) {
                        if (filename.endsWith('.xml') && filename !== 'META-INF/container.xml') {
                            targetFile = zip.files[filename];
                            break;
                        }
                    }

                    if (!targetFile) throw new Error("No XML found in MXL container");
                    xmlText = await targetFile.async("text");
                } else {
                    xmlText = await currentFile.text();
                }

                const parser = new DOMParser();
                parsedXmlDoc = parser.parseFromString(xmlText, "text/xml");

                // --- Auto Melody Detection Heuristic ---
                const parts = parsedXmlDoc.getElementsByTagName("part");

                const keywords = [
                    // Chinese
                    "笛", "flute", "dizi", "箫", "xiao", "唢呐", "suona", "管子", "guanzi", "笙", "sheng", "巴乌", "bawu",
                    "二胡", "erhu", "高胡", "gaohu", "中胡", "zhonghu", "板胡", "banhu", "京胡", "jinghu",
                    // Western
                    "violin", "soprano", "melody", "oboe", "clarinet", "trumpet", "horn",
                    // Labels
                    "solo", "主旋律", "lead", "主音", "旋律"
                ];

                const penaltyKeywords = [
                    "大阮", "daruan", "中阮", "zhongruan", "革胡", "gehu", "大提琴", "cello",
                    "低音", "bass", "打击", "percussion", "扬琴", "yangqin", "伴奏", "acc", "accompaniment"
                ];

                let bestPartIndex = 0;
                let highestScore = -Infinity;

                partSelector.innerHTML = '';

                for (let i = 0; i < parts.length; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    const id = parts[i].getAttribute("id");

                    let partName = `Part ${i + 1}`;
                    const partList = parsedXmlDoc.getElementsByTagName("part-list")[0];
                    if (partList) {
                        const scoreParts = partList.getElementsByTagName("score-part");
                        for (let sp of scoreParts) {
                            if (sp.getAttribute("id") === id) {
                                const nameNode = sp.getElementsByTagName("part-name")[0];
                                if (nameNode) partName = nameNode.textContent;
                                break;
                            }
                        }
                    }
                    option.textContent = partName;
                    partSelector.appendChild(option);

                    // Scoring
                    let score = 0;

                    // 1. Keyword check (heavy weight)
                    let nameLower = partName.toLowerCase();
                    for (let kw of keywords) {
                        if (nameLower.includes(kw.toLowerCase())) {
                            score += 1000;
                            break;
                        }
                    }

                    for (let kw of penaltyKeywords) {
                        if (nameLower.includes(kw.toLowerCase())) {
                            score -= 2000;
                            break;
                        }
                    }

                    // 2. Note density & avg pitch
                    const notes = parts[i].getElementsByTagName("note");
                    let totalPitches = 0;
                    let pitchSum = 0;

                    for (let j = 0; j < notes.length; j++) {
                        const pitchNode = notes[j].getElementsByTagName("pitch")[0];
                        if (pitchNode) {
                            totalPitches++;
                            const stepStr = pitchNode.getElementsByTagName("step")[0].textContent;
                            let alter = 0;
                            const alterNode = pitchNode.getElementsByTagName("alter")[0];
                            if (alterNode) alter = parseInt(alterNode.textContent);
                            const octave = parseInt(pitchNode.getElementsByTagName("octave")[0].textContent);

                            const stepMap = { 'C': 0, 'D': 2, 'E': 4, 'F': 5, 'G': 7, 'A': 9, 'B': 11 };
                            let semitone = stepMap[stepStr] + alter + (octave * 12);
                            pitchSum += semitone;
                        }
                    }

                    score += totalPitches; // Weight by note density
                    if (totalPitches > 0) {
                        score += (pitchSum / totalPitches) * 2; // Tweak pitch weight
                    }

                    if (score > highestScore) {
                        highestScore = score;
                        bestPartIndex = i;
                    }
                }

                // Apply auto detection
                if (parts.length > 1) {
                    partSelector.value = bestPartIndex;
                    autoDetectLabel.style.display = 'block';
                } else {
                    autoDetectLabel.style.display = 'none';
                }

                renderSelectedPart();

                convertBtn.textContent = 'Convert to Jianpu';
                convertBtn.disabled = false;

            } catch (err) {
                showError('Error processing file: ' + err.message);
            }
        });

        // --- Download Triggers ---
        function setBtnFeedback(btn, originalText) {
            btn.textContent = 'Done ✓';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 1500);
        }

        function triggerDownload(content, filename, type) {
            const blob = new Blob([content], { type: type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        document.getElementById('dlTxt').addEventListener('click', function () {
            triggerDownload(output.innerText, 'jianpu_score.txt', 'text/plain');
            setBtnFeedback(this, '.TXT');
        });

        function downloadAsImage(type, extension, btn) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const text = output.innerText;
            const lines = text.split('\n');
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

            // Explicitly use monospace fallback for precise alignment
            const fontStyle = "14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace";
            ctx.font = fontStyle;

            let maxWidth = 0;
            for (let line of lines) {
                maxWidth = Math.max(maxWidth, ctx.measureText(line).width);
            }

            canvas.width = Math.max(600, maxWidth + 80);
            canvas.height = lines.length * 30 + 80;

            // Background
            ctx.fillStyle = isDark ? '#111111' : '#FFFFFF';
            if (type === 'image/jpeg') {
                ctx.fillRect(0, 0, canvas.width, canvas.height); // JPG needs solid background
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Text 
            ctx.fillStyle = isDark ? '#FFFFFF' : '#111111';
            ctx.font = fontStyle;

            let y = 50;
            for (let line of lines) {
                ctx.fillText(line, 40, y);
                y += 30;
            }

            const link = document.createElement('a');
            link.download = `jianpu_score.${extension}`;
            link.href = canvas.toDataURL(type);
            link.click();
            setBtnFeedback(btn, type === 'image/png' ? '.PNG' : '.JPEG');
        }

        document.getElementById('dlPng').addEventListener('click', function () {
            downloadAsImage('image/png', 'png', this);
        });

        document.getElementById('dlJpeg').addEventListener('click', function () {
            downloadAsImage('image/jpeg', 'jpg', this);
        });

        document.getElementById('dlPdf').addEventListener('click', function () {
            window.print();
            setBtnFeedback(this, '.PDF');
        });

    </script>
</body>
